name: "دانلودر اسپاتیفای و ساندکلاد"

on:
  workflow_dispatch:
    inputs:
      media_url:
        description: "Spotify / SoundCloud URL"
        required: true
        type: string

      output_format:
        description: "نوع خروجی"
        required: true
        type: choice
        options:
          - mp3
          - flac
        default: mp3

      audio_quality:
        description: "کیفیت صدا"
        required: false
        type: choice
        options:
          - 128k
          - 192k
          - 320k
        default: 320k

      max_part_mb:
        description: "حداکثر حجم هر پارت (MB)"
        required: false
        type: string
        default: "1800"

      upload_method:
        description: "روش آپلود"
        required: true
        type: choice
        options:
          - repository
          - release
        default: repository

      release_tag:
        description: "نام تگ ریلیز"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  media-download:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3 python3-pip zip

          pip3 install --quiet -U spotdl yt-dlp

      - name: Download Media
        id: download
        shell: bash
        run: |
          mkdir -p release_files

          URL="${{ github.event.inputs.media_url }}"
          FORMAT="${{ github.event.inputs.output_format }}"
          QUALITY="${{ github.event.inputs.audio_quality }}"

          echo "Downloading media..."

          if [[ "$URL" == *"spotify.com"* ]]; then
            echo "Spotify detected"

            if [[ "$FORMAT" == "flac" ]]; then
              spotdl download "$URL" \
                --format flac \
                --bitrate disable \
                --output "release_files/{title}.{output-ext}"
            else
              spotdl download "$URL" \
                --format mp3 \
                --bitrate "$QUALITY" \
                --output "release_files/{title}.{output-ext}"
            fi

          elif [[ "$URL" == *"soundcloud.com"* ]]; then
            echo "SoundCloud detected"

            yt-dlp \
              -x \
              --audio-format "$FORMAT" \
              --audio-quality "$QUALITY" \
              -o "release_files/%(title)s.%(ext)s" \
              "$URL"

          else
            echo "::error::Unsupported URL"
            exit 1
          fi

          FILE_COUNT=$(find release_files -type f | wc -l)

          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "::error::No files downloaded"
            exit 1
          fi

          FIRST_FILE=$(find release_files -type f | head -n 1)
          BASENAME=$(basename "$FIRST_FILE")

          echo "filename=$BASENAME" >> "$GITHUB_OUTPUT"

      - name: Split Large Files
        shell: bash
        run: |
          THRESH_MB="${{ github.event.inputs.max_part_mb }}"

          if [[ "$THRESH_MB" -le 0 || "$THRESH_MB" -gt 1900 ]]; then
            THRESH_MB=1800
          fi

          cd release_files || exit 1

          for FILE in *; do
            [ -f "$FILE" ] || continue

            FILESIZE=$(stat -c%s "$FILE")
            THRESH_BYTES=$((THRESH_MB * 1024 * 1024))

            if [ "$FILESIZE" -gt "$THRESH_BYTES" ]; then
              echo "Splitting: $FILE"

              BASE="${FILE%.*}"

              zip -r -s "${THRESH_MB}m" "${BASE}.zip" -- "$FILE"

              rm -f "$FILE"
            fi
          done

          cd ..

      - name: Get Current Date
        id: get_date
        shell: bash
        run: |
          echo "date=$(date '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_OUTPUT"

      - name: Push to Repository
        if: github.event.inputs.upload_method == 'repository'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p downloads

          mv release_files/* downloads/ || true

          git add downloads/

          git commit -m "Media Download [skip ci]" || echo "Nothing to commit"

          git push

      - name: Upload to GitHub Releases
        if: github.event.inputs.upload_method == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('media-{0}', github.run_number) }}
          name: "Spotify and SoundCloud Download"
          body: |
            Spotify / SoundCloud Download

            URL: ${{ github.event.inputs.media_url }}
            Format: ${{ github.event.inputs.output_format }}
            Quality: ${{ github.event.inputs.audio_quality }}
            Date: ${{ steps.get_date.outputs.date }}
          files: release_files/*

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -rf release_files
